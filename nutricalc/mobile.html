<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF8C42">
<title>Saft NutriCalc</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  :root {
    color-scheme: light dark;
    --md-sys-color-primary: #4CAF82;
    --md-sys-color-secondary: #52B5A0;
    --md-sys-color-error: #E53935;
    --saft-orange: #FF8C42;
    --transition: 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #F4F9F6; --bg-card: #fff; --bg-surface: #EDF5F1; --bg-elevated: #fff;
      --on-bg: #1A2E24; --on-bg-muted: #4E6B5C; --on-bg-subtle: #8AA89A;
      --border: #D4E8DC; --border-strong: #A8CBBA;
      --chip-bg: #E8F5EE; --chip-selected: #4CAF82; --chip-text-selected: #fff;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 -4px 20px rgba(0,0,0,0.15);
      --input-bg: #F0F7F3;
      --tag-allergen: #FFF3E0; --tag-allergen-text: #E65100;
      --tag-intollerance: #FCE4EC; --tag-intollerance-text: #C62828;
      --kcal-color: #4CAF82; --protein-color: #2196F3; --carb-color: #FF9800;
      --fat-color: #9C27B0; --fiber-color: #795548;
      --backdrop: rgba(0,0,0,0.5);
    }
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0E1B14; --bg-card: #1A2B20; --bg-surface: #152219; --bg-elevated: #213328;
      --on-bg: #D4EEE0; --on-bg-muted: #8DC4A8; --on-bg-subtle: #4E7A62;
      --border: #2A4235; --border-strong: #3D6150;
      --chip-bg: #1F3528; --chip-selected: #4CAF82; --chip-text-selected: #fff;
      --shadow: 0 2px 8px rgba(0,0,0,0.4);
      --shadow-lg: 0 -4px 20px rgba(0,0,0,0.6);
      --input-bg: #172A1F;
      --tag-allergen: #3E2A00; --tag-allergen-text: #FFB74D;
      --tag-intollerance: #3B0A14; --tag-intollerance-text: #EF9A9A;
      --kcal-color: #5CC890; --protein-color: #64B5F6; --carb-color: #FFB74D;
      --fat-color: #CE93D8; --fiber-color: #A1887F;
      --backdrop: rgba(0,0,0,0.7);
    }
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Google Sans','Roboto',sans-serif;
    background: var(--bg); color: var(--on-bg); line-height: 1.4;
    font-size: 15px;
    /* iOS safe area */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ===== TOP BAR ===== */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .topbar-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .logo {
    display: flex; align-items: center; gap: 6px;
    font-size: 17px; font-weight: 700;
    white-space: nowrap;
  }
  .logo .carrot { font-size: 20px; }
  .logo .saft { color: var(--saft-orange); }
  .logo .nutri { color: var(--on-bg); }
  .logo .calc { color: var(--md-sys-color-primary); }
  .lang-selector {
    display: inline-flex; align-items: center; gap: 1px;
    background: var(--chip-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 2px;
  }
  .lang-btn {
    background: transparent; border: none; cursor: pointer;
    padding: 3px 6px; border-radius: 6px;
    font-family: inherit; font-size: 11px; font-weight: 700;
    color: var(--on-bg-muted);
  }
  .lang-btn.active { background: var(--md-sys-color-primary); color: white; }
  .topbar-spacer { display: none; }

  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--input-bg); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 8px 12px;
  }
  .search-box:focus-within { border-color: var(--md-sys-color-primary); }
  .search-box .material-icons-round { color: var(--on-bg-subtle); font-size: 20px; }
  .search-box input {
    border: none; background: transparent; outline: none;
    font-family: inherit; font-size: 15px; color: var(--on-bg); width: 100%;
  }
  .search-box input::placeholder { color: var(--on-bg-subtle); }
  .food-count-pill {
    flex-shrink: 0; font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
    background: var(--md-sys-color-primary); color: white;
  }

  /* Category chips horizontal scroll */
  .category-chips {
    display: flex; gap: 6px;
    overflow-x: auto; overflow-y: hidden;
    margin: 0 -16px; padding: 0 16px 4px;
    scrollbar-width: none;
  }
  .category-chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; white-space: nowrap;
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    background: var(--chip-bg); color: var(--on-bg-muted);
    border: 1px solid var(--border); cursor: pointer;
  }
  .chip.active { background: var(--md-sys-color-primary); color: white; border-color: var(--md-sys-color-primary); }

  /* ===== MAIN CONTENT AREA ===== */
  .content {
    height: calc(100vh - 200px); /* topbar (~140) + bottom nav (60) approx */
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding: 8px 0 80px;
  }
  .panel { display: none; padding: 0 16px; }
  .panel.active { display: block; }

  /* ===== FOOD LIST (panel-list) ===== */
  #panel-list { padding: 0; }
  .food-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .food-item:active { background: var(--bg-elevated); }
  .food-item.has-alert { border-left: 3px solid var(--md-sys-color-error); }
  .food-emoji {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .food-info { flex: 1; min-width: 0; }
  .food-name { font-size: 15px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .food-cat { font-size: 12px; color: var(--on-bg-muted); }
  .food-kcal { font-size: 15px; font-weight: 700; color: var(--kcal-color); flex-shrink: 0; }
  .food-kcal small { font-size: 10px; font-weight: 400; color: var(--on-bg-subtle); }

  .section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--on-bg-subtle);
    padding: 16px 16px 6px; background: var(--bg-surface);
  }
  .no-results {
    padding: 40px 20px; text-align: center; color: var(--on-bg-subtle);
  }
  .no-results .material-icons-round { font-size: 48px; }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
    display: grid; grid-template-columns: repeat(3, 1fr);
    background: var(--bg-card); border-top: 1px solid var(--border);
    box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 10px 8px; cursor: pointer;
    color: var(--on-bg-muted);
    border-top: 2px solid transparent;
  }
  .nav-item.active { color: var(--md-sys-color-primary); border-top-color: var(--md-sys-color-primary); }
  .nav-item .material-icons-round { font-size: 22px; }
  .nav-item span:last-child { font-size: 11px; font-weight: 500; }
  .nav-badge {
    position: absolute; top: 6px; right: calc(50% - 22px);
    background: var(--md-sys-color-error); color: white;
    font-size: 10px; font-weight: 700;
    min-width: 18px; height: 18px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 5px;
  }
  .nav-item { position: relative; }

  /* ===== DETAIL SHEET (bottom modal) ===== */
  .sheet-backdrop {
    position: fixed; inset: 0; background: var(--backdrop);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s; z-index: 80;
  }
  .sheet-backdrop.show { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 90;
    background: var(--bg-card);
    border-radius: 24px 24px 0 0;
    box-shadow: var(--shadow-lg);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-height: 90vh;
    display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .sheet.show { transform: translateY(0); }
  .sheet-handle {
    width: 40px; height: 4px; background: var(--border-strong);
    border-radius: 4px; margin: 8px auto 4px;
    flex-shrink: 0;
  }
  .sheet-content {
    overflow-y: auto; padding: 8px 16px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .sheet-close {
    position: absolute; top: 12px; right: 12px;
    background: var(--chip-bg); border: none; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--on-bg-muted);
  }
  .sheet-close .material-icons-round { font-size: 20px; }

  /* Detail content inside sheet */
  .detail-head {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 8px 0 16px; border-bottom: 1px solid var(--border);
  }
  .detail-emoji { font-size: 48px; line-height: 1; }
  .detail-info { flex: 1; }
  .detail-info h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; padding-right: 32px; }
  .category-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 2px 8px; border-radius: 6px;
    background: var(--chip-bg); color: var(--on-bg-muted);
  }
  .detail-big-kcal {
    text-align: center; padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .detail-big-kcal .num { font-size: 44px; font-weight: 700; color: var(--kcal-color); line-height: 1; }
  .detail-big-kcal .lbl { font-size: 13px; color: var(--on-bg-muted); margin-top: 4px; }

  .weight-row {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 0; border-bottom: 1px solid var(--border);
  }
  .weight-row label { font-size: 14px; font-weight: 500; color: var(--on-bg-muted); flex-shrink: 0; }
  .weight-control {
    flex: 1; display: flex; align-items: center; gap: 6px;
    background: var(--input-bg); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 6px 12px;
  }
  .weight-control:focus-within { border-color: var(--md-sys-color-primary); }
  .weight-control input {
    border: none; background: transparent; outline: none;
    font-family: inherit; font-size: 20px; font-weight: 700;
    color: var(--on-bg); flex: 1; min-width: 0; text-align: center;
  }
  .weight-control button {
    background: var(--md-sys-color-primary); color: white;
    border: none; border-radius: 50%;
    width: 32px; height: 32px; font-size: 18px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .weight-control span { font-size: 14px; color: var(--on-bg-muted); }

  .macros-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 8px; padding: 16px 0;
  }
  .macro-item {
    background: var(--bg-surface); border-radius: 12px;
    padding: 12px; text-align: center;
  }
  .macro-val { font-size: 20px; font-weight: 700; }
  .macro-bar-wrap { height: 4px; background: var(--border); border-radius: 4px; margin: 4px 0; overflow: hidden; }
  .macro-bar { height: 100%; border-radius: 4px; }
  .macro-label { font-size: 11px; color: var(--on-bg-muted); }
  .m-protein .macro-val { color: var(--protein-color); } .m-protein .macro-bar { background: var(--protein-color); }
  .m-carb .macro-val { color: var(--carb-color); } .m-carb .macro-bar { background: var(--carb-color); }
  .m-fat .macro-val { color: var(--fat-color); } .m-fat .macro-bar { background: var(--fat-color); }
  .m-fiber .macro-val { color: var(--fiber-color); } .m-fiber .macro-bar { background: var(--fiber-color); }

  .tags-section { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0 12px; }
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500;
  }
  .tag-allergen { background: var(--tag-allergen); color: var(--tag-allergen-text); }
  .tag-intollerance { background: var(--tag-intollerance); color: var(--tag-intollerance-text); }
  .tag .material-icons-round { font-size: 14px; }

  .add-btns {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    padding: 12px 0 4px;
  }
  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 14px 8px; border-radius: 12px; cursor: pointer; border: none;
    background: var(--md-sys-color-primary); color: white;
    font-family: inherit; font-size: 13px; font-weight: 600;
    box-shadow: 0 2px 8px rgba(76,175,130,0.3);
  }
  .add-btn.secondary { background: var(--md-sys-color-secondary); }
  .add-btn .material-icons-round { font-size: 18px; }
  .alert-banner {
    background: var(--tag-allergen); color: var(--tag-allergen-text);
    padding: 10px 12px; border-radius: 10px; margin: 12px 0;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .alert-banner .material-icons-round { font-size: 18px; }

  /* Meal target picker (mini) */
  .meal-target-picker {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 6px; padding: 12px 0;
  }
  .meal-target-btn {
    background: var(--chip-bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 4px; cursor: pointer;
    font-family: inherit; font-size: 11px; font-weight: 600;
    color: var(--on-bg-muted); text-align: center;
  }
  .meal-target-btn.active { background: var(--md-sys-color-primary); color: white; border-color: var(--md-sys-color-primary); }
  .meal-target-btn .e { font-size: 18px; display: block; margin-bottom: 2px; }

  /* ===== RECIPE / DIET PANELS ===== */
  .panel-header {
    padding: 16px 16px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-header h2 { font-size: 18px; font-weight: 700; }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 8px; cursor: pointer;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--on-bg-muted); font-family: inherit; font-size: 12px; font-weight: 500;
  }
  .btn-secondary.danger { border-color: var(--md-sys-color-error); color: var(--md-sys-color-error); }
  .btn-secondary .material-icons-round { font-size: 14px; }

  .recipe-name-input {
    width: 100%; background: var(--input-bg);
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-family: inherit; font-size: 16px; font-weight: 600;
    color: var(--on-bg); outline: none; margin: 0 0 12px;
  }
  .recipe-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
  }
  .recipe-row-emoji { font-size: 22px; flex-shrink: 0; }
  .recipe-row-name { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .recipe-row-weight {
    display: flex; align-items: center; gap: 4px;
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px 8px;
  }
  .recipe-row-weight input {
    border: none; background: transparent; outline: none;
    font-family: inherit; font-size: 13px; font-weight: 600;
    color: var(--on-bg); width: 42px; text-align: center;
  }
  .recipe-row-weight span { font-size: 11px; color: var(--on-bg-muted); }
  .recipe-row-kcal { font-size: 13px; font-weight: 700; color: var(--kcal-color); min-width: 55px; text-align: right; }
  .recipe-row-del {
    background: none; border: none; cursor: pointer;
    color: var(--on-bg-subtle); display: flex; padding: 2px;
  }
  .recipe-row-del .material-icons-round { font-size: 18px; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--on-bg-subtle);
  }
  .empty-state .material-icons-round { font-size: 56px; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* Recipe summary card */
  .summary-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px;
    box-shadow: var(--shadow); margin-top: 16px;
  }
  .summary-row {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }
  .summary-cell { text-align: center; }
  .summary-cell .v { font-size: 16px; font-weight: 700; }
  .summary-cell .l { font-size: 10px; color: var(--on-bg-muted); }
  .summary-cell .v.kcal { color: var(--kcal-color); }
  .summary-cell .v.prot { color: var(--protein-color); }
  .summary-cell .v.carb { color: var(--carb-color); }
  .summary-cell .v.fat { color: var(--fat-color); }
  .summary-cell .v.fib { color: var(--fiber-color); }

  .summary-allergens { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .summary-allergens h4 {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--on-bg-muted); margin-bottom: 6px;
  }
  .summary-allergens .tags { display: flex; flex-wrap: wrap; gap: 4px; }

  /* Diet panel specific */
  .diet-target {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .diet-target label { font-size: 13px; color: var(--on-bg-muted); flex: 1; }
  .diet-target input {
    width: 80px; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 6px; background: var(--input-bg); color: var(--on-bg);
    font-family: inherit; font-size: 14px; font-weight: 700; outline: none;
    text-align: center;
  }

  .filters-collapse {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 12px; overflow: hidden;
  }
  .filters-header {
    padding: 12px 14px; display: flex; align-items: center;
    cursor: pointer; user-select: none;
  }
  .filters-header h3 { font-size: 13px; font-weight: 600; flex: 1; }
  .filters-header .material-icons-round { color: var(--on-bg-muted); transition: transform 0.2s; }
  .filters-collapse.open .filters-header .material-icons-round { transform: rotate(180deg); }
  .filters-body {
    padding: 0 14px 12px; display: none;
    flex-wrap: wrap; gap: 6px;
  }
  .filters-collapse.open .filters-body { display: flex; }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 16px; cursor: pointer;
    font-size: 11px; font-weight: 500;
    background: var(--chip-bg); color: var(--on-bg-muted);
    border: 1px solid var(--border);
  }
  .filter-chip.active { background: var(--md-sys-color-error); color: white; border-color: var(--md-sys-color-error); }

  .meal-section { margin-bottom: 16px; }
  .meal-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .meal-head h3 { font-size: 14px; font-weight: 700; }
  .meal-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: var(--chip-bg); color: var(--on-bg-muted);
  }

  .day-bar {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px; box-shadow: var(--shadow);
    margin-top: 12px;
  }
  .day-bar h3 {
    font-size: 12px; font-weight: 700; color: var(--on-bg-muted);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px;
  }
  .day-progress { margin-bottom: 10px; }
  .day-progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--on-bg-muted); margin-bottom: 4px; }
  .day-progress-labels strong { color: var(--kcal-color); font-size: 15px; }
  .day-bar-bg { height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; }
  .day-bar-fill {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, var(--md-sys-color-primary), var(--md-sys-color-secondary));
    transition: width 0.5s;
  }
  .day-macros { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
  .day-macro { text-align: center; padding: 8px 4px; background: var(--bg-surface); border-radius: 8px; }
  .day-macro .v { font-size: 14px; font-weight: 700; }
  .day-macro .l { font-size: 10px; color: var(--on-bg-muted); }
  .day-macro .prot { color: var(--protein-color); }
  .day-macro .carb { color: var(--carb-color); }
  .day-macro .fat { color: var(--fat-color); }
  .day-macro .fib { color: var(--fiber-color); }

  /* ===== SNACKBAR ===== */
  .snackbar {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(40px);
    background: var(--on-bg); color: var(--bg);
    padding: 10px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-lg);
    transition: transform 0.3s, opacity 0.3s;
    opacity: 0; z-index: 200;
    display: flex; align-items: center; gap: 6px;
    max-width: 90vw;
  }
  .snackbar.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .snackbar .material-icons-round { font-size: 16px; color: var(--md-sys-color-primary); }

  /* ===== SPLASH ===== */
  .splash {
    position: fixed; inset: 0; background: var(--bg); z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .splash.fade { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .splash .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--md-sys-color-primary); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .splash p { color: var(--on-bg-muted); font-size: 13px; }
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="spinner"></div>
  <p>Loading…</p>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div class="logo">
      <span class="carrot">🥕</span>
      <span class="saft">Saft</span> <span class="nutri">Nutri</span><span class="calc">Calc</span>
    </div>
    <div></div>
    <div class="lang-selector">
      <button class="lang-btn" data-lang="it" onclick="setLanguage('it')">IT</button>
      <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
      <button class="lang-btn" data-lang="es" onclick="setLanguage('es')">ES</button>
    </div>
  </div>
  <div class="search-box">
    <span class="material-icons-round">search</span>
    <input type="text" id="searchInput" data-i18n-attr="placeholder:search_placeholder">
    <span class="food-count-pill" id="foodCountBadge">0</span>
  </div>
  <div class="category-chips" id="categoryChips"></div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- LIST PANEL -->
  <div class="panel active" id="panel-list">
    <div id="foodList"></div>
  </div>

  <!-- RECIPE PANEL -->
  <div class="panel" id="panel-recipe">
    <div class="panel-header">
      <h2 data-i18n="recipe_title"></h2>
      <button class="btn-secondary danger" onclick="clearRecipe()">
        <span class="material-icons-round">delete_sweep</span><span data-i18n="recipe_clear"></span>
      </button>
    </div>
    <input class="recipe-name-input" id="recipeName" type="text" data-i18n-attr="placeholder:recipe_name_placeholder">
    <div id="recipeItems"></div>
    <div id="recipeEmpty" class="empty-state">
      <span class="material-icons-round">add_shopping_cart</span>
      <p data-i18n-html="recipe_empty"></p>
    </div>
    <div id="recipeSummary"></div>
  </div>

  <!-- DIET PANEL -->
  <div class="panel" id="panel-diet">
    <div class="panel-header">
      <h2 data-i18n="tab_diet"></h2>
    </div>
    <div class="diet-target">
      <label data-i18n="diet_kcal_daily"></label>
      <input type="number" id="kcalTarget" value="2000" min="500" max="5000" oninput="updateDayBar()">
      <span style="font-size:12px;color:var(--on-bg-muted)">kcal</span>
    </div>
    <div class="filters-collapse" id="filtersCollapse">
      <div class="filters-header" onclick="document.getElementById('filtersCollapse').classList.toggle('open')">
        <h3 data-i18n="diet_filters"></h3>
        <span class="material-icons-round">expand_more</span>
      </div>
      <div class="filters-body" id="filterChips"></div>
    </div>
    <div id="dietMeals"></div>
    <div class="day-bar">
      <h3 data-i18n="day_summary"></h3>
      <div class="day-progress">
        <div class="day-progress-labels">
          <span><strong id="dayTotalKcal">0</strong> <span data-i18n="day_kcal_consumed"></span></span>
          <span><span id="dayKcalTargetVal">2000</span> <span data-i18n="day_kcal_target"></span></span>
        </div>
        <div class="day-bar-bg"><div class="day-bar-fill" id="dayKcalBar" style="width:0%"></div></div>
      </div>
      <div class="day-macros">
        <div class="day-macro"><div class="v prot" id="dayProt">0g</div><div class="l" data-i18n="macro_protein"></div></div>
        <div class="day-macro"><div class="v carb" id="dayCarb">0g</div><div class="l" data-i18n="macro_carbs"></div></div>
        <div class="day-macro"><div class="v fat" id="dayFat">0g</div><div class="l" data-i18n="macro_fat"></div></div>
        <div class="day-macro"><div class="v fib" id="dayFib">0g</div><div class="l" data-i18n="macro_fiber"></div></div>
      </div>
      <div id="dayAllergenSummary"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" data-tab="list" onclick="switchTab('list')">
    <span class="material-icons-round">restaurant_menu</span>
    <span data-i18n="tab_list">Cibi</span>
  </div>
  <div class="nav-item" data-tab="recipe" onclick="switchTab('recipe')">
    <span class="material-icons-round">restaurant</span>
    <span class="nav-badge" id="recipeBadge" style="display:none">0</span>
    <span data-i18n="tab_recipe"></span>
  </div>
  <div class="nav-item" data-tab="diet" onclick="switchTab('diet')">
    <span class="material-icons-round">calendar_today</span>
    <span data-i18n="tab_diet"></span>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
<div class="sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <button class="sheet-close" onclick="closeSheet()"><span class="material-icons-round">close</span></button>
  <div class="sheet-content" id="sheetContent"></div>
</div>

<!-- SNACKBAR -->
<div class="snackbar" id="snackbar">
  <span class="material-icons-round">check_circle</span>
  <span id="snackMsg"></span>
</div>

<script>
const SUPPORTED_LANGS = ['it','en','es'];
let currentLang = localStorage.getItem('nutricalc_lang') || (SUPPORTED_LANGS.includes(navigator.language.slice(0,2)) ? navigator.language.slice(0,2) : 'en');
let i18n = null;
let FOODS = [];
let selectedFood = null;
let currentWeight = 100;
let recipe = [];
let currentCategory = 'all';
let activeFilters = new Set();
let dietMeals = {colazione:[], pranzo:[], cena:[], spuntini:[]};
let currentMeal = 'pranzo';

const MEAL_KEYS = [
  {k:'colazione', i18n:'meal_breakfast', emoji:'☀️'},
  {k:'pranzo', i18n:'meal_lunch', emoji:'🌤️'},
  {k:'cena', i18n:'meal_dinner', emoji:'🌙'},
  {k:'spuntini', i18n:'meal_snacks', emoji:'🍪'}
];
const CATEGORIES = ['all','verdura','frutta','carne','pesce','formaggio','latticini','cereali','legumi','uova','oli','dolci','bevande','salumi','noci'];
const CAT_EMOJI = {all:'🍽️',verdura:'🥦',frutta:'🍎',carne:'🥩',pesce:'🐟',formaggio:'🧀',latticini:'🥛',cereali:'🌾',legumi:'🫘',uova:'🥚',oli:'🫒',dolci:'🍫',bevande:'☕',salumi:'🥓',noci:'🥜'};

async function init() {
  try {
    const [fr, lr] = await Promise.all([fetch('data.json'), fetch(`lang/${currentLang}.json`)]);
    FOODS = await fr.json();
    i18n = await lr.json();
  } catch(e) {
    document.getElementById('splash').innerHTML = `<p style="color:var(--md-sys-color-error)">⚠️ Failed to load data files.</p>`;
    return;
  }
  applyTranslations();
  buildCategoryChips();
  buildFilterChips();
  buildDietMeals();
  renderFoodList();
  highlightLang();
  document.getElementById('searchInput').addEventListener('input', renderFoodList);
  const splash = document.getElementById('splash');
  splash.classList.add('fade');
  setTimeout(() => splash.style.display='none', 300);
}

async function setLanguage(lang) {
  if (!SUPPORTED_LANGS.includes(lang) || lang === currentLang) return;
  try {
    const r = await fetch(`lang/${lang}.json`);
    i18n = await r.json();
    currentLang = lang;
    localStorage.setItem('nutricalc_lang', lang);
    document.documentElement.lang = lang;
    applyTranslations();
    buildCategoryChips();
    buildFilterChips();
    buildDietMeals();
    renderFoodList();
    renderRecipe();
    renderDiet();
    if (selectedFood) openSheet();
    highlightLang();
  } catch(e) { console.error(e); }
}

function highlightLang() {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
}

function t(k){ return (i18n?.ui?.[k]) || k; }
function tCat(c){ return (i18n?.categories?.[c]) || c; }
function tFood(id){ return (i18n?.foods?.[id]) || `#${id}`; }
function tAllergen(a){ return (i18n?.allergens?.[a]) || a; }

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
  document.querySelectorAll('[data-i18n-html]').forEach(el => el.innerHTML = t(el.getAttribute('data-i18n-html')));
  document.querySelectorAll('[data-i18n-attr]').forEach(el => {
    const [a, k] = el.getAttribute('data-i18n-attr').split(':');
    el.setAttribute(a, t(k));
  });
  const rn = document.getElementById('recipeName');
  if (rn && !rn.value) rn.value = t('recipe_name_default');
}

function buildCategoryChips() {
  document.getElementById('categoryChips').innerHTML = CATEGORIES.map(c =>
    `<div class="chip${c===currentCategory?' active':''}" onclick="filterCategory('${c}')">${CAT_EMOJI[c]} ${tCat(c)}</div>`
  ).join('');
}

function filterCategory(c) {
  currentCategory = c;
  buildCategoryChips();
  renderFoodList();
}

function renderFoodList() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let foods = FOODS;
  if (currentCategory !== 'all') foods = foods.filter(f => f.cat === currentCategory);
  if (q) foods = foods.filter(f => tFood(f.id).toLowerCase().includes(q));

  const badge = document.getElementById('foodCountBadge');
  badge.textContent = (foods.length === FOODS.length) ? `${FOODS.length}` : `${foods.length}/${FOODS.length}`;

  const list = document.getElementById('foodList');
  if (!foods.length) {
    list.innerHTML = `<div class="no-results"><span class="material-icons-round">search_off</span><p>${t('no_results')}</p></div>`;
    return;
  }
  const byCat = {};
  foods.forEach(f => { (byCat[f.cat] = byCat[f.cat] || []).push(f); });
  let html = '';
  for (const [cat, items] of Object.entries(byCat)) {
    if (currentCategory === 'all') html += `<div class="section-title">${tCat(cat)}</div>`;
    items.forEach(f => {
      const alert = [...activeFilters].some(fl => f.allergens.includes(fl)||f.intolerances.includes(fl));
      html += `<div class="food-item${alert?' has-alert':''}" onclick="selectFood(${f.id})">
        <div class="food-emoji" style="background:${catColor(f.cat)}20">${f.emoji}</div>
        <div class="food-info">
          <div class="food-name">${tFood(f.id)}${alert?' ⚠️':''}</div>
          <div class="food-cat">${tCat(f.cat)}</div>
        </div>
        <div class="food-kcal">${f.kcal}<small> kcal</small></div>
      </div>`;
    });
  }
  list.innerHTML = html;
}

function catColor(c) {
  const m = {verdura:'#4CAF50',frutta:'#FF9800',carne:'#F44336',pesce:'#2196F3',formaggio:'#FFC107',
    latticini:'#B0BEC5',cereali:'#795548',legumi:'#8BC34A',uova:'#FFEB3B',oli:'#FF5722',
    dolci:'#E91E63',bevande:'#00BCD4',salumi:'#FF7043',noci:'#A1887F'};
  return m[c]||'#9E9E9E';
}

function selectFood(id) {
  selectedFood = FOODS.find(f => f.id === id);
  currentWeight = 100;
  openSheet();
}

function openSheet() {
  if (!selectedFood) return;
  renderSheetContent();
  document.getElementById('sheetBackdrop').classList.add('show');
  document.getElementById('detailSheet').classList.add('show');
}

function closeSheet() {
  document.getElementById('sheetBackdrop').classList.remove('show');
  document.getElementById('detailSheet').classList.remove('show');
}

function renderSheetContent() {
  const f = selectedFood;
  const w = currentWeight;
  const m = w/100;
  const maxM = Math.max(f.protein, f.carbs, f.fat, f.fiber, 1);
  const allergens = f.allergens.map(a => `<span class="tag tag-allergen"><span class="material-icons-round">warning</span>${tAllergen(a)}</span>`).join('');
  const intol = f.intolerances.map(i => `<span class="tag tag-intollerance"><span class="material-icons-round">do_not_disturb_on</span>${tAllergen(i)}</span>`).join('');
  const tags = allergens + intol;
  const hasAlert = [...activeFilters].some(fl => f.allergens.includes(fl)||f.intolerances.includes(fl));

  const mealPicker = MEAL_KEYS.map(meal => `
    <button class="meal-target-btn${currentMeal===meal.k?' active':''}" onclick="setMealTarget('${meal.k}')">
      <span class="e">${meal.emoji}</span>${t(meal.i18n).replace(/^[^\s]+\s/, '')}
    </button>`).join('');

  document.getElementById('sheetContent').innerHTML = `
    <div class="detail-head">
      <div class="detail-emoji">${f.emoji}</div>
      <div class="detail-info">
        <h2>${tFood(f.id)}</h2>
        <span class="category-badge">${tCat(f.cat)}</span>
      </div>
    </div>
    ${hasAlert ? `<div class="alert-banner"><span class="material-icons-round">warning</span>${t('alert_filter')}</div>` : ''}
    <div class="detail-big-kcal">
      <div class="num" id="bigKcal">${(f.kcal*m).toFixed(0)}</div>
      <div class="lbl">${t('kcal_per')} <span id="bigKcalW">${w}</span>g</div>
    </div>
    <div class="weight-row">
      <label>${t('weight_label')}</label>
      <div class="weight-control">
        <button onclick="adjustWeight(-10)">−</button>
        <input type="number" id="weightInput" value="${w}" min="1" max="5000" oninput="updateWeight(this.value)">
        <span>g</span>
        <button onclick="adjustWeight(10)">+</button>
      </div>
    </div>
    <div class="macros-grid">
      ${macroBox('m-protein','dynProt',f.protein*m,f.protein,maxM,'macro_protein')}
      ${macroBox('m-carb','dynCarb',f.carbs*m,f.carbs,maxM,'macro_carbs')}
      ${macroBox('m-fat','dynFat',f.fat*m,f.fat,maxM,'macro_fat')}
      ${macroBox('m-fiber','dynFib',f.fiber*m,f.fiber,maxM,'macro_fiber')}
    </div>
    ${tags ? `<div class="tags-section">${tags}</div>` : ''}
    <div class="meal-target-picker">${mealPicker}</div>
    <div class="add-btns">
      <button class="add-btn" onclick="addToRecipe()">
        <span class="material-icons-round">add_shopping_cart</span> ${t('btn_add_recipe')}
      </button>
      <button class="add-btn secondary" onclick="addToDiet()">
        <span class="material-icons-round">calendar_today</span> ${t('btn_add_diet')}
      </button>
    </div>
  `;
}

function setMealTarget(k) {
  currentMeal = k;
  renderSheetContent();
}

function macroBox(cls, id, val, raw, maxM, lbl) {
  return `<div class="macro-item ${cls}">
    <div class="macro-val" id="${id}">${val.toFixed(1)}g</div>
    <div class="macro-bar-wrap"><div class="macro-bar" style="width:${Math.min(100,raw/maxM*100)}%"></div></div>
    <div class="macro-label">${t(lbl)}</div>
  </div>`;
}

function adjustWeight(delta) {
  const input = document.getElementById('weightInput');
  const v = Math.max(1, (parseInt(input.value)||0) + delta);
  input.value = v;
  updateWeight(v);
}

function updateWeight(val) {
  const w = Math.max(1, parseInt(val)||1);
  currentWeight = w;
  const f = selectedFood; if (!f) return;
  const m = w/100;
  const set = (id, v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
  set('bigKcal',(f.kcal*m).toFixed(0));
  set('bigKcalW',w);
  set('dynProt',(f.protein*m).toFixed(1)+'g');
  set('dynCarb',(f.carbs*m).toFixed(1)+'g');
  set('dynFat',(f.fat*m).toFixed(1)+'g');
  set('dynFib',(f.fiber*m).toFixed(1)+'g');
}

function addToRecipe() {
  if (!selectedFood) return;
  recipe.push({food: selectedFood, weight: currentWeight});
  showSnack(`${selectedFood.emoji} +${t('btn_add_recipe').toLowerCase()}`);
  updateRecipeBadge();
  renderRecipe();
  closeSheet();
}

function addToDiet() {
  if (!selectedFood) return;
  dietMeals[currentMeal].push({food: selectedFood, weight: currentWeight});
  const ml = MEAL_KEYS.find(m=>m.k===currentMeal);
  showSnack(`${selectedFood.emoji} ${t('snack_added_diet')} ${t(ml.i18n)}`);
  renderDiet();
  closeSheet();
}

function updateRecipeBadge() {
  const b = document.getElementById('recipeBadge');
  if (recipe.length > 0) { b.textContent = recipe.length; b.style.display = 'flex'; }
  else { b.style.display = 'none'; }
}

function renderRecipe() {
  const itemsEl = document.getElementById('recipeItems');
  const emptyEl = document.getElementById('recipeEmpty');
  const sumEl = document.getElementById('recipeSummary');
  if (!recipe.length) {
    itemsEl.innerHTML=''; emptyEl.style.display='block'; sumEl.innerHTML=''; return;
  }
  emptyEl.style.display='none';
  itemsEl.innerHTML = recipe.map((item, i) => {
    const m = item.weight/100;
    return `<div class="recipe-row">
      <div class="recipe-row-emoji">${item.food.emoji}</div>
      <div class="recipe-row-name">${tFood(item.food.id)}</div>
      <div class="recipe-row-weight">
        <input type="number" value="${item.weight}" min="1" max="5000" oninput="updateRecipeItem(${i}, this.value)">
        <span>g</span>
      </div>
      <div class="recipe-row-kcal" id="rk-${i}">${(item.food.kcal*m).toFixed(0)}</div>
      <button class="recipe-row-del" onclick="removeRecipeItem(${i})">
        <span class="material-icons-round">close</span>
      </button>
    </div>`;
  }).join('');
  renderRecipeSummary();
}

function renderRecipeSummary() {
  if (!recipe.length) return;
  const T = recipe.reduce((a,i) => {
    const m = i.weight/100;
    a.kcal+=i.food.kcal*m; a.protein+=i.food.protein*m;
    a.carbs+=i.food.carbs*m; a.fat+=i.food.fat*m; a.fiber+=i.food.fiber*m;
    return a;
  }, {kcal:0,protein:0,carbs:0,fat:0,fiber:0});
  const allergens = [...new Set(recipe.flatMap(i=>i.food.allergens))];
  const intols = [...new Set(recipe.flatMap(i=>i.food.intolerances))];
  document.getElementById('recipeSummary').innerHTML = `<div class="summary-card">
    <div class="summary-row">
      <div class="summary-cell"><div class="v kcal">${T.kcal.toFixed(0)}</div><div class="l">${t('macro_kcal')}</div></div>
      <div class="summary-cell"><div class="v prot">${T.protein.toFixed(1)}g</div><div class="l">${t('macro_protein')}</div></div>
      <div class="summary-cell"><div class="v carb">${T.carbs.toFixed(1)}g</div><div class="l">${t('macro_carbs')}</div></div>
      <div class="summary-cell"><div class="v fat">${T.fat.toFixed(1)}g</div><div class="l">${t('macro_fat')}</div></div>
      <div class="summary-cell"><div class="v fib">${T.fiber.toFixed(1)}g</div><div class="l">${t('macro_fiber')}</div></div>
    </div>
    <div class="summary-allergens">
      <h4>${t('allergens_in_recipe')}</h4>
      <div class="tags">
        ${allergens.length ? allergens.map(a=>`<span class="tag tag-allergen"><span class="material-icons-round">warning</span>${tAllergen(a)}</span>`).join('') : `<span style="font-size:12px;color:var(--on-bg-subtle)">${t('no_allergens')}</span>`}
        ${intols.map(i=>`<span class="tag tag-intollerance"><span class="material-icons-round">do_not_disturb_on</span>${tAllergen(i)}</span>`).join('')}
      </div>
    </div>
  </div>`;
}

function updateRecipeItem(idx, val) {
  recipe[idx].weight = Math.max(1, parseInt(val)||1);
  const m = recipe[idx].weight/100;
  const el = document.getElementById(`rk-${idx}`);
  if(el) el.textContent = (recipe[idx].food.kcal*m).toFixed(0);
  renderRecipeSummary();
}
function removeRecipeItem(idx) { recipe.splice(idx,1); updateRecipeBadge(); renderRecipe(); }
function clearRecipe() { recipe = []; updateRecipeBadge(); renderRecipe(); showSnack(t('snack_cleared')); }

function buildFilterChips() {
  const all = [...new Set(FOODS.flatMap(f=>[...f.allergens, ...f.intolerances]))].sort();
  document.getElementById('filterChips').innerHTML = all.map(a => `
    <div class="filter-chip${activeFilters.has(a)?' active':''}" onclick="toggleFilter('${a}')">
      <span class="material-icons-round">block</span>${tAllergen(a)}
    </div>`).join('');
}

function toggleFilter(n) {
  if (activeFilters.has(n)) activeFilters.delete(n); else activeFilters.add(n);
  buildFilterChips();
  renderFoodList();
}

function buildDietMeals() {
  document.getElementById('dietMeals').innerHTML = MEAL_KEYS.map(meal => `
    <div class="meal-section">
      <div class="meal-head">
        <h3>${t(meal.i18n)}</h3>
        <span class="meal-badge" id="badge-${meal.k}">0 kcal</span>
      </div>
      <div id="items-${meal.k}"></div>
    </div>
  `).join('');
  renderDiet();
}

function renderDiet() {
  MEAL_KEYS.forEach(meal => {
    const items = dietMeals[meal.k];
    const el = document.getElementById(`items-${meal.k}`);
    const badge = document.getElementById(`badge-${meal.k}`);
    if(!el) return;
    const total = items.reduce((s,i)=>s+i.food.kcal*(i.weight/100),0);
    badge.textContent = total.toFixed(0)+' kcal';
    el.innerHTML = items.map((item, idx) => {
      const m = item.weight/100;
      return `<div class="recipe-row">
        <div class="recipe-row-emoji">${item.food.emoji}</div>
        <div class="recipe-row-name">${tFood(item.food.id)}</div>
        <div class="recipe-row-weight">
          <input type="number" value="${item.weight}" min="1" max="5000" oninput="updateDietItem('${meal.k}',${idx},this.value)">
          <span>g</span>
        </div>
        <div class="recipe-row-kcal" id="dk-${meal.k}-${idx}">${(item.food.kcal*m).toFixed(0)}</div>
        <button class="recipe-row-del" onclick="removeDietItem('${meal.k}',${idx})">
          <span class="material-icons-round">close</span>
        </button>
      </div>`;
    }).join('');
  });
  updateDayBar();
}

function updateDietItem(meal, idx, val) {
  dietMeals[meal][idx].weight = Math.max(1, parseInt(val)||1);
  const m = dietMeals[meal][idx].weight/100;
  const el = document.getElementById(`dk-${meal}-${idx}`);
  if(el) el.textContent = (dietMeals[meal][idx].food.kcal*m).toFixed(0);
  const total = dietMeals[meal].reduce((s,i)=>s+i.food.kcal*(i.weight/100),0);
  document.getElementById(`badge-${meal}`).textContent = total.toFixed(0)+' kcal';
  updateDayBar();
}

function removeDietItem(meal, idx) { dietMeals[meal].splice(idx,1); renderDiet(); }

function updateDayBar() {
  const target = parseInt(document.getElementById('kcalTarget').value)||2000;
  document.getElementById('dayKcalTargetVal').textContent = target;
  const all = Object.values(dietMeals).flat();
  const T = all.reduce((a,i)=>{
    const m=i.weight/100;
    a.kcal+=i.food.kcal*m; a.protein+=i.food.protein*m;
    a.carbs+=i.food.carbs*m; a.fat+=i.food.fat*m; a.fiber+=i.food.fiber*m;
    return a;
  },{kcal:0,protein:0,carbs:0,fat:0,fiber:0});
  const pct = Math.min(100,(T.kcal/target)*100);
  document.getElementById('dayTotalKcal').textContent = T.kcal.toFixed(0);
  const bar = document.getElementById('dayKcalBar');
  bar.style.width = pct+'%';
  bar.style.background = pct>=100 ? 'var(--md-sys-color-error)' :
    'linear-gradient(90deg, var(--md-sys-color-primary), var(--md-sys-color-secondary))';
  document.getElementById('dayProt').textContent = T.protein.toFixed(1)+'g';
  document.getElementById('dayCarb').textContent = T.carbs.toFixed(1)+'g';
  document.getElementById('dayFat').textContent = T.fat.toFixed(1)+'g';
  document.getElementById('dayFib').textContent = T.fiber.toFixed(1)+'g';
  const allergens = [...new Set(all.flatMap(i=>i.food.allergens))];
  const intols = [...new Set(all.flatMap(i=>i.food.intolerances))];
  const ael = document.getElementById('dayAllergenSummary');
  if(allergens.length||intols.length) {
    ael.innerHTML = `<div class="summary-allergens" style="margin-top:10px;padding-top:10px">
      <h4>${t('day_allergens')}</h4>
      <div class="tags">
        ${allergens.map(a=>`<span class="tag tag-allergen"><span class="material-icons-round">warning</span>${tAllergen(a)}</span>`).join('')}
        ${intols.map(i=>`<span class="tag tag-intollerance"><span class="material-icons-round">do_not_disturb_on</span>${tAllergen(i)}</span>`).join('')}
      </div>
    </div>`;
  } else ael.innerHTML = '';
}

function switchTab(name) {
  document.querySelectorAll('.nav-item').forEach(t => t.classList.toggle('active', t.dataset.tab===name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id===`panel-${name}`));
  if (name === 'recipe') renderRecipe();
  if (name === 'diet') renderDiet();
}

function showSnack(msg) {
  const sb = document.getElementById('snackbar');
  document.getElementById('snackMsg').textContent = msg;
  sb.classList.add('show');
  clearTimeout(sb._t);
  sb._t = setTimeout(() => sb.classList.remove('show'), 2200);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
